name: Xserver Auto Renew

on:
  schedule:
    # 每天日本时间 09:00, 15:00, 21:00 运行（防止错过 24 小时窗口）
    - cron: '0 0,6,12 * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install playwright
          playwright install --with-deps chromium

      - name: Run Auto Renew
        env:
          # 这里的变量名必须与 main.py 中 os.getenv() 的名称一致
          USERNAME: ${{ secrets.XSERVER_USER }}
          PASSWORD: ${{ secrets.XSERVER_PASS }}
          ID_VPS: ${{ secrets.XSERVER_VPS_ID }}
        run: |
          # 注意：如果是 fa0311 的版本，运行方式是模块化调用
          python -m xserver_auto_renew.main 
          # 如果是普通脚本，则使用 python main.py
